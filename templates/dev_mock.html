{% extends 'base.html' %}
{% block title %}Mock Injector — {{ channel.name }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Mock Message Injector <span class="page-subtitle">{{ channel.name }}</span></h1>
</div>
<div class="card" style="max-width:520px">
  <form id="mock-form">
    <div class="form-row">
      <label>Screen name</label>
      <input type="text" id="screen_name" value="TestUser" class="form-input">
    </div>
    <div class="form-row">
      <label>Message</label>
      <input type="text" id="message" value="Hello from mock!" class="form-input">
    </div>
    <div class="form-row">
      <label>Type</label>
      <select id="message_type" class="form-input">
        <option value="text">text</option>
        <option value="emoji">emoji</option>
        <option value="qa">qa</option>
      </select>
    </div>
    <div class="form-row">
      <label>Language (optional)</label>
      <input type="text" id="user_language" placeholder="e.g. en" class="form-input">
    </div>
    <button type="submit" class="btn btn-primary">Inject message</button>
  </form>
  <div id="mock-status" class="mock-status"></div>
</div>
<p style="margin-top:1rem">
  <a href="{{ url_for('queue.queue_page', channel_id=channel.id) }}" class="btn btn-ghost">Go to queue</a>
</p>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('mock-form').addEventListener('submit', async e => {
  e.preventDefault();
  const body = {
    screen_name:  document.getElementById('screen_name').value,
    message:      document.getElementById('message').value,
    message_type: document.getElementById('message_type').value,
    user_language: document.getElementById('user_language').value || undefined,
  };
  const r = await fetch('/dev/inject/{{ channel.id }}', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  document.getElementById('mock-status').textContent = data.ok ? 'Injected.' : 'Error: ' + JSON.stringify(data);
});
</script>
{% endblock %}
